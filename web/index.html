<style>
  html,body{font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;}
  .scrollbar-thin::-webkit-scrollbar{width:6px;height:6px;}
  .scrollbar-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
  .progress-bar{transition:width .6s cubic-bezier(.2,.8,.2,1);}
  .tag-chip{transition:all .15s;}
  .tag-chip:hover{transform:translateY(-1px);}
  details>summary{list-style:none;cursor:pointer;}
  details>summary::-webkit-details-marker{display:none;}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;}
  .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem .9rem;border-radius:8px;font-size:.875rem;font-weight:500;transition:all .15s;}
  .btn-primary{background:#1f3864;color:#fff;}
  .btn-primary:hover{background:#162947;}
  .btn-ghost{background:#f1f5f9;color:#334155;}
  .btn-ghost:hover{background:#e2e8f0;}
  .nav-item{display:flex;align-items:center;gap:.6rem;padding:.55rem .8rem;border-radius:8px;font-size:.9rem;color:#475569;cursor:pointer;}
  .nav-item:hover{background:#eef2ff;}
  .nav-item.active{background:#1f3864;color:#fff;font-weight:500;}
  .nav-item.active svg{color:#fff;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .fade-in{animation:fadeIn .25s ease-out;}
  .toast{animation:fadeIn .2s ease-out;}
</style>

/* ============================================================
 *   UTIL
 * ============================================================ */
const $ = sel => document.querySelector(sel);
const el = (tag, attrs={}, children=[]) => {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==='class') e.className = v;
    else if(k==='html') e.innerHTML = v;
    else if(k.startsWith('on') && typeof v==='function') e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
};
const fmtCurrency = n => 'NT$ ' + n.toLocaleString();
const tagById = id => DB.tags.find(t=>t.id===id);
const productById = id => DB.products.find(p=>p.id===id);

const courseById = id => DB.courses.find(c=>c.id===id);

function toast(msg, kind='info'){
  const c = document.getElementById('toast-stack');
  const colors = {info:'bg-slate-800', ok:'bg-emerald-600', warn:'bg-amber-600', err:'bg-rose-600'};
  const t = el('div',{class:`toast text-white text-sm px-4 py-2.5 rounded-lg shadow-lg ${colors[kind]||colors.info}`}, [msg]);
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),200); }, 2200);
}

function tagChip(tag, opts={}){
  const t = typeof tag==='string'? tagById(tag): tag;
  if(!t) return '';
  const style = `background:${t.color}1a;color:${t.color};border:1px solid ${t.color}33;`;
  return `<span class="tag-chip inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium" style="${style}">${t.name}</span>`;
}

function icon(name, cls='w-4 h-4'){
  return `<i data-lucide="${name}" class="${cls}"></i>`;
}

function renderSidenav(){
  const items = NAV[STATE.role];
  const nav = $('#sidenav');
  nav.innerHTML = '';
  items.forEach(it=>{
    const node = el('div',{
      class:`nav-item ${STATE.page===it.key?'active':''}`,
      onclick:()=>{ STATE.page = it.key; render(); }
    });
    node.innerHTML = `${icon(it.icon)}<span>${it.label}</span>`;
    nav.appendChild(node);
  });
  lucide.createIcons();
}

function setRole(role){
  STATE.role = role;
  STATE.page = role==='member' ? 'home' : 'dashboard';
  // role buttons styling
  document.querySelectorAll('#role-switch button').forEach(b=>{
    if(b.dataset.role===role){ b.classList.add('bg-white','text-[#1f3864]','shadow'); }
    else { b.classList.remove('bg-white','text-[#1f3864]','shadow'); b.classList.add('text-slate-500'); }
  });
  // who am I badge
  const w = $('#who-am-i');
  if(role==='member'){
    const m = memberById(CURRENT_MEMBER_ID);
    w.innerHTML = `${icon('user','w-4 h-4')}<span>${m.name}（${m.level}）</span>`;
  } else {
    w.innerHTML = `${icon('shield','w-4 h-4')}<span>後臺管理員</span>`;
  }
  render();
  lucide.createIcons();
}

document.querySelectorAll('#role-switch button').forEach(b=>{
  b.addEventListener('click',()=>setRole(b.dataset.role));
});

    main.appendChild(node);
  } else {

  }
  lucide.createIcons();
}

  const h = el('div',{class:'pb-2'});
  h.innerHTML = `<div class="text-xl font-bold text-slate-900">${title}</div>
                 <div class="text-sm text-slate-500 mt-0.5">${subtitle}</div>`;
  return h;
}
function emptyState(msg){
  const e = el('div',{class:'card p-10 text-center text-slate-500'});
  e.innerHTML = `${icon('inbox','w-10 h-10 mx-auto text-slate-300 mb-2')}<div>${msg}</div>`;
  return e;
}

/* ============================================================
 *   DEMO HANDLERS
 * ============================================================ */
window.__demoJoin  = name => toast(`已加入活動：${name}`,'ok');
window.__enroll    = id => { const c = courseById(id); toast(`報名成功：${c.title}（系統將於 ${c.date} 自動提醒）`,'ok'); };
window.__checkin   = name => toast(`今日已完成打卡：${name}`,'ok');
window.__upload    = name => toast(`已上傳「${name}」，待後臺管理員審核`,'info');
window.__viewMember= id => { const m = memberById(id); toast(`檢視會員：${m.name}（原型示範）`,'info'); };
window.__assignTag = id => { const t = tagById(id); toast(`已開啟「${t.name}」標籤派發對話框（原型示範）`,'info'); };
window.__notice    = msg => toast(msg,'info');

/* ============================================================
 *   INIT
 * ============================================================ */
setRole('member');
</script>
</body>
</html>
