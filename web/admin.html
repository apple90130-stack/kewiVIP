<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIP 管理後台</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>VIP 管理後台</h1>
    <button id="admin-logout" class="ghost" style="display:none">登出</button>
  </header>

  <main class="container">
    <section id="admin-login-card" class="card auth-card">
      <div class="auth-badge">VIP</div>
      <h2>管理員登入</h2>
      <p class="small">請輸入管理員帳號密碼。</p>
      <form id="admin-login-form" class="inline-form">
        <input id="admin-account" type="text" placeholder="帳號" required />
        <input id="admin-password" type="password" placeholder="密碼" required />
        <button type="submit">登入管理端</button>
      </form>
      <p class="demo-tip">測試管理員：admin / 123456</p>
      <p id="admin-login-error" class="error"></p>
    </section>

    <div id="admin-app" style="display:none">
      <section class="card">
        <h2>會員管理與標籤</h2>
        <form id="tag-form" class="inline-form">
          <select id="member-select"></select>
          <input id="tag-input" type="text" placeholder="新增標籤（例：益生菌）" required />
          <button type="submit">新增標籤</button>
        </form>
        <ul id="member-tags" class="list"></ul>
      </section>

      <section class="card">
        <h2>課程管理</h2>
        <form id="course-form" class="inline-form">
          <input id="course-title" type="text" placeholder="課程名稱" required />
          <input id="course-time" type="datetime-local" required />
          <input id="course-tag" type="text" placeholder="投放標籤" required />
          <button type="submit">建立課程</button>
        </form>
        <ul id="admin-courses" class="list"></ul>
      </section>

      <section class="card">
        <h2>任務審核</h2>
        <ul id="task-review" class="list"></ul>
      </section>

      <section class="card">
        <h2>公告管理</h2>
        <form id="notice-form" class="inline-form">
          <input id="notice-text" type="text" placeholder="輸入公告內容" required />
          <button type="submit">發布公告</button>
        </form>
        <ul id="admin-notices" class="list"></ul>
      </section>
    </div>
  </main>

  <script src="/web/app.js"></script>
</body>
</html>
